name: ndvi-env
channels:
  - conda-forge
  - defaults
dependencies:
  # Core geospatial stack — use conda-forge to avoid binary conflicts
  - python=3.11
  - rasterio=1.5.0
  - fiona=1.10.1
  - geopandas=1.1.2
  - shapely=2.1.2
  - affine=2.4.0
  - rasterstats=0.20.0
  # Scientific
  - numpy=2.3.5
  - pandas=2.3.3
  - pyarrow
  # DB
  - psycopg2=2.9.11
  - sqlalchemy=2.0.46
  # Utils
  - psutil=7.2.2
  - boto3=1.42.69
  # STAC client — easier via pip
  - pip
  - pip:
    - pystac==1.14.3
    - pystac-client==0.9.0
